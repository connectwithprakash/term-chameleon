name: Demo

# Manually re-render the README demo GIF from demo/demo.tape and upload it as an
# artifact to download and commit. Run on demand (Actions tab -> Demo -> Run workflow);
# it does NOT run on every push, and does NOT auto-commit binaries.
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install term-chameleon on PATH
        run: uv tool install .
      - name: Install ffmpeg (vhs dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Render the tape
        uses: charmbracelet/vhs-action@v2
        with:
          path: demo/demo.tape
      - name: Upload the rendered demo as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo
          path: |
            demo/demo.gif
            demo/demo.mp4
